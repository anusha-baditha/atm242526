<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #2c3e50;
            overflow: hidden;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: white;
            margin: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #1abc9c;
        }

        .logout-btn {
            background-color: #e74c3c;
            border: none;
            padding: 8px 15px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>My Dashboard</h2>

        <div class="nav-links">
            <a href="#">Withdraws</a>
            <a href="#">deposits</a>
            <a href="#"></a>
        </div>
        {{request.cookies.get('user')}}
        <form action="#" method="POST">
            <button class="logout-btn">Logout</button>
        </form>
    </div>

</body>
</html>
