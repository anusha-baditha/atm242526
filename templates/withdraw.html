<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PUT Amount Example</title>
</head>
<body>


<center>
    <h2>Update Amount</h2>
<form id="amountForm">
    <label for="amount">Amount:</label>
    <input type="number" id="amount" name="amount" required>
    <button type="submit">Send</button>
</form>
</center>
<p id="responseMsg"></p>

<script>
document.getElementById("amountForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const amount = document.getElementById("amount").value;

    fetch("{{url_for('withdraw')}}", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: amount })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("responseMsg").innerText = "Success: " + JSON.stringify(data);
    })
    .catch(error => {
        document.getElementById("responseMsg").innerText = "Error: " + error;
    });
});
</script>

</body>
</html>
